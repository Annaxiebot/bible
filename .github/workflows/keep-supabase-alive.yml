name: Keep Supabase Alive

on:
  schedule:
    # Runs at 9:00 AM UTC every Monday and Thursday
    - cron: '0 9 * * 1,4'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/notes?select=count&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" || echo "000")
          echo "Supabase response: $response"
          if [ "$response" = "200" ] || [ "$response" = "204" ]; then
            echo "Supabase is alive!"
          else
            echo "Warning: Supabase returned $response"
            exit 1
          fi
