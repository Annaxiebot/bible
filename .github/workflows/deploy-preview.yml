name: Deploy Preview

on:
  push:
    branches:
      - dev
      - 'feature/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine preview path
        id: preview-path
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          # Replace slashes with dashes for folder name
          SAFE_NAME=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
          echo "name=$SAFE_NAME" >> $GITHUB_OUTPUT
          echo "Preview will be at: /bible/preview/$SAFE_NAME/"

      - name: Build with preview base path
        run: npx vite build --base /bible/preview/${{ steps.preview-path.outputs.name }}/
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to gh-pages preview folder
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: preview/${{ steps.preview-path.outputs.name }}
          keep_files: true  # Don't delete other previews or main deploy
