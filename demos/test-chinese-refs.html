<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Bible Reference Test</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-case {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
        }
        .bible-ref {
            color: #4f46e5;
            text-decoration: underline;
            cursor: pointer;
            font-weight: 500;
        }
        .bible-ref:hover {
            color: #3730a3;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-left: 3px solid #10b981;
            font-size: 14px;
        }
        .error {
            border-left-color: #ef4444;
        }
        h1 {
            color: #1e293b;
        }
        .test-input {
            font-family: monospace;
            color: #64748b;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>🔗 Chinese Bible Reference Detection Test</h1>
    
    <div class="test-case">
        <div class="test-input">测试文本: "请查看 申命记26:3 这段经文"</div>
        <div id="test1"></div>
        <div class="result" id="result1"></div>
    </div>
    
    <div class="test-case">
        <div class="test-input">测试文本: "创世记1:1-3 是圣经的开头"</div>
        <div id="test2"></div>
        <div class="result" id="result2"></div>
    </div>
    
    <div class="test-case">
        <div class="test-input">测试文本: "约翰福音3:16 和 Genesis 1:1 都很重要"</div>
        <div id="test3"></div>
        <div class="result" id="result3"></div>
    </div>
    
    <div class="test-case">
        <div class="test-input">测试文本: "罗马书8:28-30, 以弗所书2:8, Philippians 4:13"</div>
        <div id="test4"></div>
        <div class="result" id="result4"></div>
    </div>

    <script>
        // Chinese book mapping
        const CHINESE_BOOK_MAP = {
            '创世记': 'GEN', '出埃及记': 'EXO', '利未记': 'LEV', '民数记': 'NUM',
            '申命记': 'DEU', '约书亚记': 'JOS', '士师记': 'JDG', '路得记': 'RUT',
            '撒母耳记上': '1SA', '撒母耳记下': '2SA', '列王纪上': '1KI', '列王纪下': '2KI',
            '历代志上': '1CH', '历代志下': '2CH', '以斯拉记': 'EZR', '尼希米记': 'NEH',
            '以斯帖记': 'EST', '约伯记': 'JOB', '诗篇': 'PSA', '箴言': 'PRO',
            '传道书': 'ECC', '雅歌': 'SNG', '以赛亚书': 'ISA', '耶利米书': 'JER',
            '耶利米哀歌': 'LAM', '以西结书': 'EZK', '但以理书': 'DAN', '何西阿书': 'HOS',
            '约珥书': 'JOE', '阿摩司书': 'AMO', '俄巴底亚书': 'OBA', '约拿书': 'JON',
            '弥迦书': 'MIC', '那鸿书': 'NAM', '哈巴谷书': 'HAB', '西番雅书': 'ZEP',
            '哈该书': 'HAG', '撒迦利亚书': 'ZEC', '玛拉基书': 'MAL', '马太福音': 'MAT',
            '马可福音': 'MRK', '路加福音': 'LUK', '约翰福音': 'JHN', '使徒行传': 'ACT',
            '罗马书': 'ROM', '哥林多前书': '1CO', '哥林多后书': '2CO', '加拉太书': 'GAL',
            '以弗所书': 'EPH', '腓立比书': 'PHP', '歌罗西书': 'COL', '帖撒罗尼迦前书': '1TH',
            '帖撒罗尼迦后书': '2TH', '提摩太前书': '1TI', '提摩太后书': '2TI', '提多书': 'TIT',
            '腓利门书': 'PHM', '希伯来书': 'HEB', '雅各书': 'JAS', '彼得前书': '1PE',
            '彼得后书': '2PE', '约翰一书': '1JN', '约翰二书': '2JN', '约翰三书': '3JN',
            '犹大书': 'JUD', '启示录': 'REV'
        };

        // English book names (simplified for testing)
        const ENGLISH_BOOKS = ['Genesis', 'Exodus', 'Leviticus', 'Numbers', 'Deuteronomy', 
            'Joshua', 'Judges', 'Ruth', 'Matthew', 'Mark', 'Luke', 'John', 'Acts', 
            'Romans', 'Corinthians', 'Galatians', 'Ephesians', 'Philippians', 'Colossians',
            'Thessalonians', 'Timothy', 'Titus', 'Philemon', 'Hebrews', 'James', 'Peter',
            'Revelation'];

        function parseBibleReference(text) {
            // Try Chinese pattern first
            const chineseBookNames = Object.keys(CHINESE_BOOK_MAP).join('|');
            const chinesePattern = new RegExp(`(${chineseBookNames})(\\d+):(\\d+)(?:-(\\d+))?`);
            const chineseMatch = text.match(chinesePattern);
            
            if (chineseMatch) {
                const bookName = chineseMatch[1];
                const chapter = parseInt(chineseMatch[2]);
                const verseStart = parseInt(chineseMatch[3]);
                const verseEnd = chineseMatch[4] ? parseInt(chineseMatch[4]) : null;
                const bookId = CHINESE_BOOK_MAP[bookName];
                
                return {
                    bookId,
                    bookName,
                    chapter,
                    verseStart,
                    verseEnd,
                    fullRef: chineseMatch[0]
                };
            }
            
            // Try English pattern
            const englishPattern = new RegExp(`(${ENGLISH_BOOKS.join('|')})\\s+(\\d+):(\\d+)(?:-(\\d+))?`, 'i');
            const englishMatch = text.match(englishPattern);
            
            if (englishMatch) {
                return {
                    bookName: englishMatch[1],
                    chapter: parseInt(englishMatch[2]),
                    verseStart: parseInt(englishMatch[3]),
                    verseEnd: englishMatch[4] ? parseInt(englishMatch[4]) : null,
                    fullRef: englishMatch[0]
                };
            }
            
            return null;
        }

        function processTextWithBibleRefs(text) {
            const chineseBookNames = Object.keys(CHINESE_BOOK_MAP).join('|');
            const englishBookNames = ENGLISH_BOOKS.join('|');
            
            const combinedPattern = new RegExp(
                `(${chineseBookNames})\\d+:\\d+(?:-\\d+)?|(${englishBookNames})\\s+\\d+:\\d+(?:-\\d+)?`,
                'gi'
            );
            
            const parts = [];
            let lastIndex = 0;
            let match;
            let matches = [];
            
            while ((match = combinedPattern.exec(text)) !== null) {
                matches.push({
                    index: match.index,
                    text: match[0],
                    length: match[0].length
                });
            }
            
            // Build HTML
            let html = '';
            matches.forEach((m, i) => {
                // Add text before reference
                if (m.index > lastIndex) {
                    html += text.substring(lastIndex, m.index);
                }
                
                // Add clickable reference
                const ref = parseBibleReference(m.text);
                html += `<span class="bible-ref" onclick="handleClick('${m.text}', ${JSON.stringify(ref).replace(/"/g, '&quot;')})">${m.text}</span>`;
                
                lastIndex = m.index + m.length;
            });
            
            // Add remaining text
            if (lastIndex < text.length) {
                html += text.substring(lastIndex);
            }
            
            return {
                html: html || text,
                matches: matches.length
            };
        }

        function handleClick(refText, refData) {
            const data = typeof refData === 'string' ? JSON.parse(refData) : refData;
            alert(`点击了: ${refText}\n\n解析结果:\n${JSON.stringify(data, null, 2)}`);
        }

        // Run tests
        const tests = [
            { text: '请查看 申命记26:3 这段经文', id: 'test1', resultId: 'result1' },
            { text: '创世记1:1-3 是圣经的开头', id: 'test2', resultId: 'result2' },
            { text: '约翰福音3:16 和 Genesis 1:1 都很重要', id: 'test3', resultId: 'result3' },
            { text: '罗马书8:28-30, 以弗所书2:8, Philippians 4:13', id: 'test4', resultId: 'result4' }
        ];

        tests.forEach(test => {
            const result = processTextWithBibleRefs(test.text);
            document.getElementById(test.id).innerHTML = result.html;
            document.getElementById(test.resultId).innerHTML = 
                `✅ 找到 ${result.matches} 个引用 ${result.matches > 0 ? '(点击测试导航)' : ''}`;
        });
    </script>
</body>
</html>
